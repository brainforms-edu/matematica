<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="t d">
  <title id="t">Transformacoes geometricas no plano</title>
  <desc id="d">Exemplos didaticos de translacao, rotacao, reflexao e homotetia com textos ampliados.</desc>

  <rect width="1500" height="760" fill="#f8fafc"/>
  <rect x="24" y="22" width="1452" height="716" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>

  <text x="64" y="80" font-family="Verdana, sans-serif" font-size="42" font-weight="700" fill="#1f2937">Transformacoes geometricas</text>
  <text x="64" y="116" font-family="Verdana, sans-serif" font-size="24" fill="#334155">A mesma figura pode mudar de posicao, orientacao ou tamanho.</text>

  <g transform="translate(62,170)">
    <rect x="0" y="0" width="320" height="360" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <text x="160" y="48" text-anchor="middle" font-family="Verdana, sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">Original</text>
    <polygon points="105,280 160,150 215,280" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="4"/>
    <text x="160" y="320" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#1f2937">Triangulo base</text>
  </g>

  <g transform="translate(420,170)">
    <rect x="0" y="0" width="320" height="360" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
    <text x="160" y="48" text-anchor="middle" font-family="Verdana, sans-serif" font-size="30" font-weight="700" fill="#166534">Translacao</text>
    <polygon points="95,300 150,170 205,300" fill="#bbf7d0" stroke="#15803d" stroke-width="4"/>
    <line x1="72" y1="140" x2="242" y2="140" stroke="#15803d" stroke-width="4" marker-end="url(#a)"/>
    <text x="160" y="330" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#1f2937">Desloca sem girar</text>
  </g>

  <g transform="translate(778,170)">
    <rect x="0" y="0" width="320" height="360" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="3"/>
    <text x="160" y="48" text-anchor="middle" font-family="Verdana, sans-serif" font-size="30" font-weight="700" fill="#92400e">Rotacao</text>
    <polygon points="105,220 205,170 185,290" fill="#fde68a" stroke="#b45309" stroke-width="4"/>
    <circle cx="155" cy="230" r="6" fill="#78350f"/>
    <path d="M115 150 A60 60 0 0 1 200 138" fill="none" stroke="#b45309" stroke-width="4" marker-end="url(#a)"/>
    <text x="160" y="330" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#1f2937">Gira em torno de um ponto</text>
  </g>

  <g transform="translate(1136,170)">
    <rect x="0" y="0" width="320" height="360" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="3"/>
    <text x="160" y="44" text-anchor="middle" font-family="Verdana, sans-serif" font-size="26" font-weight="700" fill="#6d28d9">Reflexao e Homotetia</text>
    <line x1="160" y1="100" x2="160" y2="300" stroke="#6d28d9" stroke-width="4" stroke-dasharray="10 8"/>
    <polygon points="120,280 150,200 180,280" fill="#e9d5ff" stroke="#7c3aed" stroke-width="4"/>
    <polygon points="194,270 226,212 258,270" fill="#fecaca" stroke="#dc2626" stroke-width="4"/>
    <text x="160" y="324" text-anchor="middle" font-family="Verdana, sans-serif" font-size="21" fill="#1f2937">Espelha e amplia/reduz</text>
  </g>

  <g transform="translate(62,558)">
    <rect x="0" y="0" width="1394" height="150" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="24" y="48" font-family="Verdana, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Dica:</text>
    <text x="24" y="88" font-family="Verdana, sans-serif" font-size="24" fill="#1e293b">Translacao, rotacao e reflexao preservam forma e tamanho.</text>
    <text x="24" y="124" font-family="Verdana, sans-serif" font-size="24" fill="#1e293b">Na homotetia, o formato e preservado, mas o tamanho muda pela escala k.</text>
  </g>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
